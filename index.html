<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="utf-8">
    <title>Dashboard Logístico Pro v1.0.18</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #f0f4f7; padding: 20px; color: #2c3e50; margin: 0; }
        .dashboard-container { max-width: 1400px; margin: 0 auto; }
        .card { background: white; padding: 20px; border-radius: 10px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); margin-bottom: 25px; position: relative; }
        .loading-overlay { position: absolute; top:0; left:0; width:100%; height:100%; background:rgba(255,255,255,0.9); display:none; flex-direction:column; align-items:center; justify-content:center; z-index:100; border-radius:10px; }
        .spinner { width: 40px; height: 40px; border: 4px solid #f3f3f3; border-top: 4px solid #3498db; border-radius: 50%; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .header-title { display: flex; align-items: center; justify-content: space-between; border-bottom: 2px solid #ecf0f1; padding-bottom: 15px; margin-bottom: 20px; }
        .controls { display: flex; gap: 15px; margin-bottom: 20px; align-items: center; background: white; padding: 15px; border-radius: 10px; }
        .btn { padding: 10px 20px; border-radius: 5px; border: none; font-weight: bold; cursor: pointer; transition: 0.3s; }
        .btn-update { background: #3498db; color: white; }
        .btn-excel { background: #27ae60; color: white; }
        .table-premium { width: 100%; border-collapse: collapse; margin-top: 10px; }
        .table-premium th { background: #f8f9fa; padding: 12px; border: 1px solid #dee2e6; text-align: left; font-size: 12px; color: #7f8c8d; }
        .table-premium td { padding: 12px; border: 1px solid #dee2e6; font-size: 14px; }
        .num { text-align: right; font-family: 'Courier New', monospace; font-weight: bold; }
        #v-tag { margin-left: auto; color: #e74c3c; font-weight: 900; font-size: 1.2rem; background: #ffdada; padding: 5px 15px; border-radius: 50px; }
    </style>
</head>
<body>
    <div class="dashboard-container">
        <div class="controls">
            <strong>Periodo de Análisis:</strong>
            <input type="date" id="dateFrom">
            <input type="date" id="dateTo">
            <button class="btn btn-update" id="btnRun">🚀 ACTUALIZAR TODO</button>
            <span id="v-tag">VERSIÓN 1.0.18</span>
        </div>

        <div class="card" id="card-km">
            <div class="loading-overlay" id="load-km"><div class="spinner"></div><p>Analizando Kilometraje...</p></div>
            <div class="header-title">
                <h2>1. Ranking de Kilómetros y Eficiencia (Carga vs Vacío)</h2>
                <button class="btn btn-excel" id="xlsx-km">Exportar KM</button>
            </div>
            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 30px;">
                <div style="height: 350px;"><canvas id="chart-km"></canvas></div>
                <div style="overflow-y: auto; max-height: 350px;">
                    <table class="table-premium">
                        <thead><tr><th>Vehículo</th><th class="num">KM Vacío</th><th class="num">Eficiencia</th></tr></thead>
                        <tbody id="body-km"></tbody>
                    </table>
                </div>
            </div>
        </div>

        <div class="card" id="card-idle">
            <div class="loading-overlay" id="load-idle"><div class="spinner"></div><p>Cruzando paradas con Zonas Geotab...</p></div>
            <div class="header-title">
                <h2>2. Ralentí Acumulado por Zona Geotab</h2>
                <button class="btn btn-excel" id="xlsx-idle">Exportar Ralentí</button>
            </div>
            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 30px;">
                <div style="height: 350px;"><canvas id="chart-idle"></canvas></div>
                <div style="overflow-y: auto; max-height: 350px;">
                    <table class="table-premium">
                        <thead><tr><th>Zona Detectada</th><th class="num">Tiempo (HH:mm)</th></tr></thead>
                        <tbody id="body-idle"></tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>
    <script src="app.js"></script>
</body>
</html>
