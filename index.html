<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="utf-8">
    <title>Dashboard Logístico Pro v1.0.11</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <style>
        body { font-family: 'Segoe UI', Roboto, sans-serif; background: #f4f7f9; padding: 20px; color: #253746; margin: 0; }
        .dashboard-container { max-width: 1350px; margin: 0 auto; }
        .card { background: white; padding: 25px; border-radius: 8px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); margin-bottom: 25px; }
        .header-title { display: flex; align-items: center; border-bottom: 2px solid #e0e6eb; padding-bottom: 15px; margin-bottom: 20px; }
        .header-title h2 { margin: 0; font-size: 20px; color: #253746; }
        .controls { display: flex; gap: 12px; margin-bottom: 20px; align-items: center; flex-wrap: wrap; }
        input[type="date"] { padding: 8px; border-radius: 4px; border: 1px solid #caced1; font-size: 13px; }
        .btn { padding: 8px 16px; border-radius: 4px; border: none; font-size: 13px; font-weight: 600; cursor: pointer; transition: 0.2s; }
        .btn-primary { background: #2780e3; color: white; }
        .btn-success { background: #008767; color: white; }
        .btn-warning { background: #e67e22; color: white; }
        .table-premium { width: 100%; border-collapse: collapse; border: 1px solid #caced1; }
        .table-premium th { background: #f0f3f6; font-size: 11px; padding: 12px; border: 1px solid #caced1; text-align: left; }
        .table-premium td { padding: 10px 12px; border: 1px solid #caced1; font-size: 13px; }
        .num { text-align: right !important; font-family: 'Consolas', monospace; }
        .ef-container { display: flex; align-items: center; gap: 10px; width: 140px; }
        .ef-bar-bg { background: #eef3f8; border-radius: 10px; height: 6px; flex-grow: 1; overflow: hidden; }
        .ef-bar-fill { height: 100%; border-radius: 10px; }
        .chart-container { position: relative; height: 350px; width: 100%; }
        #version-tag { position: fixed; bottom: 10px; right: 10px; font-size: 10px; color: #aaa; }
    </style>
</head>
<body>
    <div class="dashboard-container">
        <div class="card">
            <div class="header-title"><h2>Ranking: KM en Vacío</h2></div>
            <div class="controls">
                <input type="date" id="vacioFrom"> <input type="date" id="vacioTo">
                <button class="btn btn-primary" id="vacioUpdate">Actualizar</button>
            </div>
            <div class="chart-container"><canvas id="chartVacio"></canvas></div>
        </div>

        <div class="card">
            <div class="header-title"><h2>Eficiencia Detallada</h2></div>
            <div class="controls">
                <input type="date" id="tablaFrom"> <input type="date" id="tablaTo">
                <button class="btn btn-primary" id="tablaUpdate">Filtrar</button>
            </div>
            <table class="table-premium">
                <thead><tr><th>Vehículo</th><th class="num">KM Vacío</th><th class="num">KM Carga</th><th class="num">Total</th><th>Eficiencia</th></tr></thead>
                <tbody id="tablaCuerpo"></tbody>
            </table>
        </div>

        <div class="card">
            <div class="header-title">
                <svg width="24" height="24" style="margin-right:12px; fill:#e67e22;" viewBox="0 0 24 24"><path d="M12,2L4.5,20.29L5.21,21L12,18L18.79,21L19.5,20.29L12,2Z"/></svg>
                <h2>Impacto de Ralentí por Zona Operativa</h2>
            </div>
            <div class="controls">
                <span>Periodo Ralentí:</span>
                <input type="date" id="idleFrom">
                <input type="date" id="idleTo">
                <button class="btn btn-warning" id="idleUpdate">Analizar Ralentí</button>
            </div>
            <div style="display: grid; grid-template-columns: 1fr 1.2fr; gap: 25px;">
                <div class="chart-container"><canvas id="chartIdle"></canvas></div>
                <div>
                    <table class="table-premium">
                        <thead><tr><th>Zona / Ubicación</th><th class="num">Ralentí (h)</th><th class="num">Costo Est. (€)</th></tr></thead>
                        <tbody id="idleTablaCuerpo"></tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>
    <span id="version-tag">v1.0.11</span>
    <script src="app.js"></script>
</body>
</html>
